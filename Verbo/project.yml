name: Verbo
options:
  bundleIdPrefix: com.verbo
  deploymentTarget:
    macOS: "14.0"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.0"

configs:
  Debug: debug
  Release: release

targets:
  Verbo:
    type: application
    platform: macOS
    sources:
      - path: Verbo
        excludes:
          - Info.plist
          - Verbo.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.verbo.Verbo
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: Verbo/Info.plist
        CODE_SIGN_ENTITLEMENTS: Verbo/Verbo.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        DEVELOPMENT_TEAM: 5F36UWTDH5

  VerboTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: VerboTests
    dependencies:
      - target: Verbo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.verbo.VerboTests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Verbo.app/Contents/MacOS/Verbo
        BUNDLE_LOADER: $(TEST_HOST)
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
